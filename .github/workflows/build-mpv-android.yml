name: Build mpv-android Release APK
# 触发规则：推送master分支、提交PR、手动一键构建
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

env:
  MODULE_NAME: app
  NDK_VERSION: "26.2.11"
  JDK_VERSION: 17

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. 拉取完整源码 + 递归拉取ffmpeg/libmpv子模块
      - name: Checkout Source & Submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      # 2. 安装mpv底层编译依赖 Python3 / Meson / Nasm / Ninja
      - name: Install Cross Compile Dependencies
        run: |
          sudo apt update -y
          sudo apt install -y python3 python3-pip nasm ninja-build
          pip3 install meson

      # 3. 配置JDK 17
      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JDK_VERSION }}
          distribution: temurin
          cache: gradle

      # 4. 安装Android SDK + 指定NDK版本
      - name: Setup Android SDK & NDK
        uses: android-actions/setup-android@v3
        with:
          ndk: ${{ env.NDK_VERSION }}

      # 5. 缓存Gradle依赖，大幅减少重复下载时间
      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-mpv-android-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      # 6. 赋予gradlew执行权限（Linux必加，否则权限报错）
      - name: Grant Gradle Execute Permission
        run: chmod +x ./gradlew

      # 7. 编译Release安装包
      - name: Build Release APK
        run: ./gradlew :${{ env.MODULE_NAME }}:assembleRelease

      # 8. 上传编译好的APK为流水线产物
      - name: Upload Release APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mpv-android-release-apk
          path: ${{ env.MODULE_NAME }}/build/outputs/apk/release/*.apk
