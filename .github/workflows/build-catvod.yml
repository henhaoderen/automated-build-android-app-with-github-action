name: Build CatVodOpen APK
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  MODULE_NAME: app
  JDK_VERSION: 17

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 拉取源码，该项目无复杂子模块，无需递归submodules
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # 配置JDK17
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JDK_VERSION }}
          distribution: temurin
          cache: gradle

      # 安装Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # Gradle缓存，加速构建
      - name: Cache Gradle Dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-catvod-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      # 赋予gradlew执行权限
      - name: Add execute permission to gradlew
        run: chmod +x ./gradlew

      # 编译Release未签名包
      - name: Build Release APK
        run: ./gradlew :${{ env.MODULE_NAME }}:assembleRelease

      # 上传APK到产物
      - name: Upload Release APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CatVodOpen-release-apk
          path: ${{ env.MODULE_NAME }}/build/outputs/apk/release/*.apk
